name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest

  # A docs build is platform-independent, so this job runs on ubuntu only; the
  # pytest matrix above covers both OSes for the examples harness.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --locked

      - name: Build site
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Deployment uses the Pages artifact actions, so no gh-pages branch ever
  # exists. One-time repository setup: set the Pages source to "GitHub Actions".
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  srd-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --locked

      - name: Regenerate SRD data
        run: uv run python -m tools.srd_compile

      # Any drift — modified files or brand-new untracked outputs, which a plain
      # git diff misses — fails the build: srd/, the compiler, and osrlib/data/
      # cannot silently diverge.
      - name: Fail on drift
        run: |
          status=$(git status --porcelain -- src/osrlib/data)
          if [ -n "$status" ]; then
            echo "generated data is out of date; run: uv run python -m tools.srd_compile"
            echo "$status"
            git diff -- src/osrlib/data
            exit 1
          fi
